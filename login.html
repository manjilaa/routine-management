<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniRoutine - Login</title>
    <link rel="stylesheet" href="login-styles.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.1/dist/umd/lucide.min.js"></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <div class="logo-circle">
                <img src="ku.png" alt="University Logo">
            </div>
            <h1>UniRoutine</h1>
            <p>University Routine Management System</p>
        </div>

        <div class="login-card">
            <h2 style="text-align: center; margin-bottom: 1.5rem; color: #111827;">Login</h2>

            <form id="authForm">
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="email@university.edu">
                </div>

                <div>
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required placeholder="••••••••">
                        <span class="password-toggle" id="passwordToggle">Show</span>
                    </div>
                </div>

                <div id="errorMessage" style="display: none; color: #dc2626; font-size: 0.875rem; margin-bottom: 1rem; text-align: center;"></div>

                <button type="submit" class="btn-primary">
                    <i data-lucide="log-in"></i>
                    Login
                </button>
            </form>

            <div class="student-access">
                <button id="studentViewBtn" class="btn-student-view">
                    <i data-lucide="calendar"></i>
                    Continue as Student
                </button>
            </div>
        </div>
    </div>

    <script src="login-script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
